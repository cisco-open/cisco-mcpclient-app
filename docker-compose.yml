version: '3.8'

services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-mcpclient-dev
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-llm-app
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=cisco-mcpclient-app
      - GRAFANA_API_KEY=${GRAFANA_API_KEY}
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./dist:/var/lib/grafana/plugins/cisco-mcpclient-app:ro
      - ./config/mcp-servers.ini:/etc/grafana/mcp-servers.ini:ro
    networks:
      - grafana-network
    depends_on:
      - mcp-server

  mcp-server:
    image: grafana/mcp-grafana:latest
    container_name: grafana-mcp-server-dev
    command: ["-t", "streamable-http"]
    ports:
      - "3031:3031"
    environment:
      - GRAFANA_URL=http://grafana:3000
      - GRAFANA_API_KEY=${GRAFANA_API_KEY}
    networks:
      - grafana-network

volumes:
  grafana-storage:

networks:
  grafana-network: