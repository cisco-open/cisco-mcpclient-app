apiVersion: 1

apps:
  - type: 'cisco-mcpclient-app'
    org_id: 1
    org_name: 'cisco'
    disabled: false
    jsonData:
      # Legacy API configuration (keeping for backward compatibility)
      apiUrl: http://default-url.com

      # New MCP Servers Configuration
      mcpServers:
        - id: local-grafana-mcp
          name: Local Grafana MCP Server
          url: http://grafana-mcp-server:8000/mcp
          type: local
          enabled: true
          description: Local MCP server for development and testing
          authType: none

        - id: kubernetes-mcp
          name: Kubernetes MCP Server
          url: http://mcp-kubernetes-server:3041/mcp
          type: remote
          enabled: true
          description: Kubernetes cluster management via MCP
          authType: none

        # Example of a production server with environment variable substitution
        # - id: production-mcp
        #   name: Production MCP Server
        #   url: ${MCP_SERVER_URL}
        #   type: remote
        #   enabled: false
        #   description: Production MCP server with authentication
        #   authType: bearer
        #   authToken: ${MCP_API_TOKEN}

    secureJsonData:
      # Legacy API key (keeping for backward compatibility)
      apiKey: secret-key

      # Secure tokens for MCP servers (reference by server ID)
      # mcpToken_production-mcp: ${MCP_API_TOKEN}
