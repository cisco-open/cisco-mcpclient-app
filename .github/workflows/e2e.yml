name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build backend
        run: go build -o dist/gpx_cisco-mcpclient-app_linux_amd64 ./pkg

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Grafana
        run: docker compose -f docker-compose.ci.yml up -d

      - name: Wait for Grafana
        run: |
          timeout 90 bash -c 'until curl -sf http://localhost:3000/api/health; do sleep 2; done'

      - name: Debug plugin directory
        run: |
          echo "=== Plugin directory listing ==="
          docker exec cisco-mcpclient-ci ls -la /var/lib/grafana/plugins/cisco-mcpclient-app/
          echo ""
          echo "=== plugin.json ==="
          docker exec cisco-mcpclient-ci cat /var/lib/grafana/plugins/cisco-mcpclient-app/plugin.json | head -30
          echo ""
          echo "=== Binary file check ==="
          docker exec cisco-mcpclient-ci file /var/lib/grafana/plugins/cisco-mcpclient-app/gpx_cisco-mcpclient-app_linux_amd64 || echo "Binary not found!"
          echo ""
          echo "=== Plugin API status ==="
          curl -sf http://localhost:3000/api/plugins/cisco-mcpclient-app/settings | python3 -m json.tool || echo "API call failed"

      - name: Grafana logs
        if: always()
        run: docker compose -f docker-compose.ci.yml logs grafana 2>&1

      - name: Run E2E tests
        run: npm run e2e
        env:
          CI: true

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop Grafana
        if: always()
        run: docker compose -f docker-compose.ci.yml down
