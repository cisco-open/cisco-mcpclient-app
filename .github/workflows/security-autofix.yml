name: Security Auto-Fix

on:
  schedule:
    - cron: '0 8 * * 6'  # Every Saturday at 08:00 UTC (after scan completes)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    name: Auto-Fix Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Fix npm vulnerabilities
        run: |
          npm audit fix --force || true
          npm ci

      - name: Update vulnerable Go dependencies
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck -json ./... > /tmp/vuln-report.json 2>/dev/null || true
          go get -u ./...
          go mod tidy

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: auto-remediate dependency vulnerabilities"
          title: "fix: auto-remediate dependency vulnerabilities"
          body: |
            ## Automated Vulnerability Fix

            This PR was automatically generated by the Security Auto-Fix workflow.

            **Changes:**
            - `npm audit fix --force` applied to resolve Node.js dependency vulnerabilities
            - Go dependencies updated to patch known vulnerabilities

            **Next steps:**
            - Review changes for breaking updates
            - Run full test suite before merging
            - Check that no major version bumps introduce incompatibilities
          branch: security/auto-fix-vulnerabilities
          delete-branch: true
          labels: security,automated
