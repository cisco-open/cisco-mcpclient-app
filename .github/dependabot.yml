version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
    open-pull-requests-limit: 3
    groups:
      all-npm:
        patterns:
          - "*"
    commit-message:
      prefix: "deps"
    minimum-version-age: 7

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
    open-pull-requests-limit: 3
    groups:
      all-go:
        patterns:
          - "*"
    commit-message:
      prefix: "deps"
    minimum-version-age: 7

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
    open-pull-requests-limit: 3
    groups:
      all-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "deps"
    minimum-version-age: 7
